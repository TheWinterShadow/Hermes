[project]
site_name = "Hermes"
site_url = "https://hermes.thewintershadow.com/"

[project.theme]
name = "material"
logo = "assets/hermes.png"
favicon = "assets/hermes.png"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tabs",
    "navigation.top",
    "navigation.footer",
    "content.code.copy",
    "toc.integrate",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle = { icon = "lucide/moon", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle = { icon = "lucide/sun", name = "Switch to light mode" }

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.nav]]
Home = "index.md"

[[project.nav]]
Installation = "installation/index.md"

[[project.nav]]
Usage = "usage/index.md"

[[project.nav]]
Architecture = "architecture/index.md"

[[project.nav]]
Privacy = "privacy/index.md"

[project.extra]
social = [
    { icon = "fontawesome/brands/github", link = "https://github.com/TheWinterShadow/Hermes" },
]

markdown_extensions = [
    "admonition",
    "attr_list",
    "md_in_html",
    "pymdownx.details",
    "pymdownx.highlight",
    "pymdownx.superfences",
    "pymdownx.tabbed",
    "pymdownx.keys",
]
