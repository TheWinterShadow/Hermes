name: Build and Release DMG

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release archive
        run: |
          xcodebuild \
            -project Hermes.xcodeproj \
            -scheme Hermes \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            build

      - name: Prepare app bundle
        run: |
          APP_PATH=$(find build -name "Hermes.app" -type d | head -1)
          cp -R "$APP_PATH" Hermes.app

      - name: Create DMG
        uses: L-Super/create-dmg-actions@v1.0.3
        with:
          dmg_name: Hermes-${{ github.event.release.tag_name }}
          src_dir: Hermes.app

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: Hermes-*.dmg
