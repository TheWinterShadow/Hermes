name: Hermes
options:
  bundleIdPrefix: com.thewintershadow
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    DEVELOPMENT_TEAM: "7VH47ZWV4T"

targets:
  Hermes:
    type: application
    platform: macOS
    sources:
      - path: Hermes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thewintershadow.hermes
        INFOPLIST_FILE: Hermes/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Hermes/Resources/Hermes.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application: Elijah Winter (7VH47ZWV4T)"
        CODE_SIGNING_REQUIRED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    dependencies:
      - package: WhisperKit
    entitlements:
      path: Hermes/Resources/Hermes.entitlements
      properties:
        com.apple.security.device.audio-input: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.12.0"
